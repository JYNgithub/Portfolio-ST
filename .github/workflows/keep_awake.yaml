name: Keep Alive

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    # Version for ubuntu and playwright are specified for consistency
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Cache if possible
      - name: Cache Playwright
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.58.0

      - name: Install dependencies
        run: |
          pip install requests playwright==1.58.0
          playwright install chromium

      - name: Run keep alive
        run: python etc/keepalive.py